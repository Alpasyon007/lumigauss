services:
  compose:
    build: .
    image: lumigauss_sun2
    volumes:
      - ./:/workspace
      - /etc/sudoers.d:/etc/sudoers.d:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - "D:/OneDrive - University of Surrey/Datasets/LumiGaussData/data:/workspace/data"
    environment:
      - DISPLAY=host.docker.internal:0.0
      - CUDA_LAUNCH_BLOCKING=1
      - PYTHONUNBUFFERED=1
    network_mode: "host"
    ipc: host
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864
    #command: python ./train.py -s="./data/st_colmap/undistorted" -m="./output/st_mlp" --with_mlp
    #command: python ./train.py -s="./data/lk2_colmap/undistorted" -m="./output/lk2_mlp" --with_mlp
    #command: python render_day.py -s="./data/st_colmap/undistorted" -m output/st_sun_shadow_map --use_sun --shadow_method shadow_map
    command: python render_day.py -s="./data/st_colmap/undistorted" -m output/st_sun_shadow_map --use_sun --shadow_fix_bias 0.005 --shadow_map_resolution 8192 --shadow_fixes --shadow_debug_panels --no_flip_x --flip_y --no_flip_z
    #command: python ./train.py -s="./data/lk2_colmap/undistorted" --sun_json_path="./data/lk2_colmap/sun_directions_blender.json" -m="./output/lk2_sun_shadow_map" --use_sun --use_residual_sh --shadow_method shadow_map --shadow_map_resolution 8192 --sky_mask_path="./data/lk2_colmap/dynamic_masks/sky"
    #command: python ./train.py -s="./data/st_colmap/undistorted" --sun_json_path="./data/st_colmap/sun_directions_blender.json" -m="./output/st_sun_shadow_map" --use_sun --use_residual_sh --shadow_method shadow_map --shadow_map_resolution 8192 --sky_mask_path="./data/st_colmap/dynamic_masks/sky"
    #command: python ./train.py -s="./data/st_colmap/undistorted" --sun_json_path="./data/st_colmap/sun_directions_blender.json" -m="./output/st_sun_shadow_map_adaptive_dens" --use_sun --use_residual_sh --shadow_method shadow_map --shadow_map_resolution 8192 --sky_mask_path="./data/st_colmap/dynamic_masks/sky" --use_adaptive_dens
    #command: python ./train.py -s="./data/st_colmap/undistorted" --sun_json_path="./data/st_colmap/sun_directions_blender.json" -m="./output/st_sun_shadow_map_dens_all" --use_sun --use_residual_sh --shadow_method shadow_map --shadow_map_resolution 8192 --sky_mask_path="./data/st_colmap/dynamic_masks/sky" --use_adaptive_dens --dens_everything --dens_everything_per_cell 128 --dens_everything_max_gaussians 1000000 --adaptive_dens_
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
